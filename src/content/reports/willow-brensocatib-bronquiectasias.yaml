clinical_message: |
  Brensocatib, inibidor oral da DPP-1 (alvo da ativação de proteases serínicas neutrofílicas), **reduz exacerbações pulmonares** em bronquiectasias não-fibrocísticas com histórico de pelo menos 2 exacerbações no ano prévio. Em 24 semanas, a proporção com ao menos 1 exacerbação caiu de 48% (placebo) para 32% — <span class="good">1 exacerbação evitada a cada 6 pacientes tratados</span>. O sinal foi consistente em subgrupos por gravidade, frequência de exacerbações prévias e uso crônico de macrolídeo. Sendo fase 2 com 256 pacientes, é prova de conceito; o fase 3 ASPEN (>1.600 pacientes) confirmou os resultados, sustentando a inibição da DPP-1 como **primeiro alvo anti-inflamatório viável** em uma doença sem terapia modificadora aprovada.

bottom_line:
  - 'Brensocatib **reduz o risco de exacerbação** em bronquiectasias não-fibrocísticas com histórico de exacerbações: 48% → 32% em 24 semanas (<span class="good">1 exacerbação evitada a cada 6 pacientes tratados</span>).'
  - "**Mecanismo inédito**: inibição oral da DPP-1 bloqueia a ativação de proteases serínicas neutrofílicas (elastase, catepsina G, proteinase 3) ainda na medula óssea."
  - "Benefício **consistente em todos os subgrupos** analisados — gravidade (BSI), exacerbações prévias, uso crônico de macrolídeo e infecção por *Pseudomonas aeruginosa*."
  - "Fase 2 (n=256), prova de conceito; o fase 3 ASPEN (>1.600 pacientes) **confirmou os achados** e embasou a submissão ao FDA."

