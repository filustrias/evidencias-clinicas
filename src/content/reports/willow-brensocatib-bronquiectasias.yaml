  ratio: "1:1:1"
  arm_intervention: 82
  arm_comparator: 87
  follow_up: "24 semanas de tratamento"

pico:
  population:
    main: "Adultos com bronquiectasias não-fibrocísticas confirmadas por tomografia, com pelo menos 2 exacerbações no ano anterior"
    detail: "Idade ≥ 18 anos; produção crônica de escarro; bronquiectasia documentada em HRCT. Excluídos: fibrose cística e doença ativa por micobactéria não tuberculosa em tratamento"
  intervention:
    main: "Brensocatib 10 mg via oral, 1x ao dia, por 24 semanas"
    detail: "Inibidor oral, seletivo, reversível e competitivo da DPP-1 (cathepsin C); reduz a ativação de proteases serínicas de neutrófilos (incluindo elastase neutrofílica)"
  comparator:
    main: "Placebo via oral"
  outcomes:
    primary: "Tempo até a primeira exacerbação pulmonar nas 24 semanas de tratamento"
    secondary: "Taxa de exacerbações pulmonares; alteração na atividade da elastase neutrofílica no escarro; segurança"

