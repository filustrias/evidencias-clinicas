title: "Brensocatib em bronquiectasias não-fibrocísticas — WILLOW (fase 2)"

citation:
  authors: "Chalmers JD, Haworth CS, Metersky ML, Loebinger MR, Blasi F, Sibila O, O'Donnell AE, Sullivan EJ, Mange KC, Fernandez C, Zou J, Daley CL"
  journal: "N Engl J Med"
